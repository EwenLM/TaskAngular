<ul class="d-flex flex-row">
    <li 
        class="btn" 
        [ngClass]="activeFilter === 'All' ? 'btn-primary' : 'btn-outline-primary'"
        (click)="onFilterClick('All')">
        All
    </li>
    <li 
        class="btn" 
        [ngClass]="activeFilter === 'Open' ? 'btn-primary' : 'btn-outline-primary'"
        (click)="onFilterClick('Open')">
        Open
    </li>
    <li 
        class="btn" 
        [ngClass]="activeFilter === 'Done' ? 'btn-primary' : 'btn-outline-primary'"
        (click)="onFilterClick('Done')">
        Done
    </li>
</ul>
